<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <input type="number" name="" id="num1" placeholder="Enter num1">
  <input type="number" name="" id="num2" placeholder="Enter num2">
  <p id="showRes"></p>
  <button onclick="Add()">Add</button>
  <button onclick="Sub()">Subtract</button>

  <input type="text" name="" id="age" placeholder="Enter your age">
  <p id="showAge"></p>
  <button onclick="CheckAge()">Check age</button> 

  <input type="text" placeholder="Enter any Text" id="txt" onkeyup="showValue(this.value)">
  <p id="showTxT"></p>


  <script>
    function showValue(val){
      document.querySelector('#showTxT').innerText = val;
    }

    function CheckAge(){
      let age = document.querySelector('#age').value;
      if(age <= 18){
        document.querySelector('#showAge').innerText = "You are Child";
      }else{
         document.querySelector('#showAge').innerText = "You are adult";
      }
    } 

    function Add() {
      let a = Number(document.querySelector('#num1').value);
      let b = Number(document.querySelector('#num2').value);

      let res = a + b;
      document.querySelector('#showRes').innerHTML = res;
    }

    function Sub(){
      let a = Number(document.querySelector('#num1').value);
      let b = Number(document.querySelector('#num2').value);

      let res = a - b;
      document.querySelector('#showRes').innerText = res;
    }

    let age = 21;
    function printAge(){
      console.log(`Your age is ${age}`); 
    }
    printAge();
    age = 20;
    printAge();
    age = 44;
    printAge();

  </script>
</body>
