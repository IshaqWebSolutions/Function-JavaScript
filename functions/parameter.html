<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parameter</title>
</head>

<body>
  <h1>Passing Parameter in function</h1>


  <script>
    function sum(a, b) {
      let sum = a + b;
      return sum;
    }
    console.log(sum(4, 5));
    console.log(sum(5, 5));
    console.log(sum(6, -3));
    console.log(sum(78, -24));
    console.log(sum(4, 7));

    //greet
    function greet(name) {
      let student = 'Hello! ' + name;
      return student;
    }
    console.log(greet('Ishaq'));

    //another 
    function sum(...numbers) {
      let total = 0;
      for (let num of numbers) {
        total += num;
      }
      return total;
    }
    console.log(sum(1, 2, 3, 4)); // 10
    
    //default function
    function greeting(name = 'Pyaree'){
      console.log(`Hello ${name} uncle`);
    }
    greeting();
  </script>
</body>

</html>
